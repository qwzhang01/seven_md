name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            bundle_type: dmg
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_type: nsis
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_type: msi
            artifact_path: src-tauri/target/release/bundle/msi/*.msi
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache Rust dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          src-tauri/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install dependencies
      run: npm ci

    - name: Install Windows dependencies
      if: matrix.os == 'windows-latest'
      run: |
        choco install -y visualstudio2022buildtools
        choco install -y windows-sdk-10.0

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      with:
        tagName: ${{ github.ref_name }}
        releaseName: 'Seven MD ${{ github.ref_name }}'
        releaseBody: 'See CHANGELOG.md for details.'
        releaseDraft: true
        prerelease: false
        args: --target ${{ matrix.target }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.bundle_type }}-${{ matrix.os }}
        path: ${{ matrix.artifact_path }}
        retention-days: 30

    - name: Create Release
      if: matrix.os == 'macos-latest' && matrix.bundle_type == 'dmg'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          src-tauri/target/release/bundle/dmg/*.dmg
          src-tauri/target/release/bundle/macos/*.app
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Windows Release
      if: matrix.os == 'windows-latest' && matrix.bundle_type == 'nsis'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          src-tauri/target/release/bundle/nsis/*.exe
          src-tauri/target/release/bundle/msi/*.msi
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
