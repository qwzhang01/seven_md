name: Test Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-build:
    name: Test Build on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build frontend
        run: npm run build

      - name: Test Tauri build (without bundling)
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Verify build artifacts
        run: |
          echo "Build completed successfully on ${{ matrix.platform }}"
          echo "Build artifacts location: src-tauri/target/release/"
          ls -la src-tauri/target/release/ || echo "No release artifacts found (expected for test build)"